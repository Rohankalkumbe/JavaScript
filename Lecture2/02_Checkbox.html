<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <script>
        function showcourse(){
            let courses = document.getElementsByName("course");
            let c = "";
            for(let i=0; i<courses.length; i++){
                if(courses[i].checked){
                    c += courses[i].value + " ";
                }
            }
            document.getElementById("result").innerHTML = c;
        }
    </script>

</head>
<body>
    <input type="checkbox" name="course" value="c"><label>C</label><br/>
    <input type="checkbox" name="course" value="c++"><label>C++</label><br/>
    <input type="checkbox" name="course" value="java"><label>Java</label><br/>
    <input type="checkbox" name="course" value="C#"><label>C#</label><br/>
    <input type="checkbox" name="course" value="PHP"><label>PHP</label><br/>
    <input type="checkbox" name="course" value="Python"><label>Python</label><br/>

    <input type="button" value="Click" onclick="showcourse()"><br/>
    <span id="result"></span>
</body>
</html>
